<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Soska bar x Punch – Колесо фортуни</title>

  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div class="app">
    <h1 class="brand">Soska bar x Punch</h1>

    <!-- Колесо -->
    <div class="wheel-wrap">
      <div class="wheel-container">
        <img id="wheel" src="assets/wheel.png?v=4" alt="Wheel" />

        <!-- Поінтер, який обертається навколо центра -->
        <div id="pointer-rotator" class="pointer-rotator">
          <img
            src="assets/pointer.svg?v=4"
            alt="Pointer"
            class="pointer"
          />
        </div>
      </div>
    </div>

    <!-- Кнопка + підпис -->
    <button id="spinBtn" class="spin-btn">🎡 Крутити</button>
    <p id="result" class="result"></p>
  </div>

  <!-- Оверлей салюту -->
  <div id="fireworks" class="fireworks">
    <div id="fireworks-text"></div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="wheel.js?v=10"></script>
</body>
</html>
